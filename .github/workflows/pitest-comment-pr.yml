name: Mutation Testing - Post Result to PR

# Runs after the Mutation Testing workflow completes. Uses workflow_run so
# the GITHUB_TOKEN is scoped to the base repo and can write PR comments
# even when the PR comes from a fork.
on:
  workflow_run:
    workflows: [ Mutation Testing ]
    types: [ completed ]

permissions:
  actions: read
  checks: write
  pull-requests: write

env:
  MAVEN_ARGS: -B -V -ntp -e -Djansi.passthrough=true -Dstyle.color=always

jobs:

  post-to-pr:

    name: "Post to PR #${{ github.event.workflow_run.pull_requests[0].number }}"
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'maven'
      - name: Download Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pitest
          path: target/pit-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Post Result to PR
        run: ./mvnw $MAVEN_ARGS pitest-github:github -DrepoToken=${{ secrets.GITHUB_TOKEN }}
